services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: recipebot
      POSTGRES_USER: recipebot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_STRONG}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipebot -d recipebot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - recipebot-postgres-prod:/var/lib/postgresql/data

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://recipebot:CHANGE_ME_STRONG@postgres:5432/recipebot}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: .
    command: ["python", "-m", "scripts.run_web"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://recipebot:CHANGE_ME_STRONG@postgres:5432/recipebot}
      ARTIFACT_ROOT: /app/artifacts
      ARTIFACT_BASE_URL: https://recipebot.devgw.com/cards
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8097:8000"
    volumes:
      - ./artifacts:/app/artifacts:ro

  worker:
    build: .
    command: ["python", "-m", "app.jobs.worker"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://recipebot:CHANGE_ME_STRONG@postgres:5432/recipebot}
      ARTIFACT_ROOT: /app/artifacts
      ARTIFACT_BASE_URL: https://recipebot.devgw.com/cards
      IMAGEMAGICK_BINARY: convert
      RSVG_CONVERT_BINARY: rsvg-convert
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./artifacts:/app/artifacts

  bot:
    profiles: ["reddit"]
    build: .
    command: ["python", "-m", "scripts.run_reddit_listener"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://recipebot:CHANGE_ME_STRONG@postgres:5432/recipebot}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  recipebot-postgres-prod:
