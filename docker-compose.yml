services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recipebot
      POSTGRES_USER: recipebot
      POSTGRES_PASSWORD: recipebot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipebot -d recipebot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - recipebot-postgres:/var/lib/postgresql/data

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://recipebot:recipebot@postgres:5432/recipebot
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: ["python", "-m", "app.jobs.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://recipebot:recipebot@postgres:5432/recipebot
      ARTIFACT_ROOT: /app/artifacts
      ARTIFACT_BASE_URL: https://recipebot.devgw.com/cards
      IMAGEMAGICK_BINARY: convert
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USERNAME: ${REDDIT_USERNAME:-}
      REDDIT_PASSWORD: ${REDDIT_PASSWORD:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-RecipeBot/0.1}
      REDDIT_DRY_RUN: ${REDDIT_DRY_RUN:-true}
      REDDIT_DM_RESULTS: ${REDDIT_DM_RESULTS:-true}
      REDDIT_PUBLIC_FALLBACK_ON_DM_FAILURE: ${REDDIT_PUBLIC_FALLBACK_ON_DM_FAILURE:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./artifacts:/app/artifacts

  web:
    build: .
    command: ["python", "-m", "scripts.run_web"]
    environment:
      DATABASE_URL: postgresql+psycopg://recipebot:recipebot@postgres:5432/recipebot
      ARTIFACT_ROOT: /app/artifacts
      ARTIFACT_BASE_URL: https://recipebot.devgw.com/cards
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8000
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8097:8000"
    volumes:
      - ./artifacts:/app/artifacts:ro

  bot:
    profiles: ["reddit"]
    build: .
    command: ["python", "-m", "scripts.run_reddit_listener"]
    environment:
      DATABASE_URL: postgresql+psycopg://recipebot:recipebot@postgres:5432/recipebot
      BOT_ENABLED: ${BOT_ENABLED:-false}
      ENABLED_SUBREDDITS: ${ENABLED_SUBREDDITS:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USERNAME: ${REDDIT_USERNAME:-}
      REDDIT_PASSWORD: ${REDDIT_PASSWORD:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-RecipeBot/0.1}
      REDDIT_COMMAND: ${REDDIT_COMMAND:-!recipecard}
      REDDIT_DRY_RUN: ${REDDIT_DRY_RUN:-true}
      REDDIT_DM_RESULTS: ${REDDIT_DM_RESULTS:-true}
      REDDIT_PUBLIC_FALLBACK_ON_DM_FAILURE: ${REDDIT_PUBLIC_FALLBACK_ON_DM_FAILURE:-false}
      REDDIT_PUBLIC_ACK_ON_QUEUE: ${REDDIT_PUBLIC_ACK_ON_QUEUE:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  recipebot-postgres:
