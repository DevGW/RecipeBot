services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recipebot
      POSTGRES_USER: recipebot
      POSTGRES_PASSWORD: recipebot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipebot -d recipebot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - recipebot-postgres:/var/lib/postgresql/data

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://recipebot:recipebot@postgres:5432/recipebot
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: ["python", "-m", "app.jobs.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://recipebot:recipebot@postgres:5432/recipebot
      ARTIFACT_ROOT: /app/artifacts
      ARTIFACT_BASE_URL: https://recipebot.devgw.com/cards
      IMAGEMAGICK_BINARY: convert
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./artifacts:/app/artifacts

  web:
    build: .
    command: ["python", "-m", "scripts.run_web"]
    environment:
      DATABASE_URL: postgresql+psycopg://recipebot:recipebot@postgres:5432/recipebot
      ARTIFACT_ROOT: /app/artifacts
      ARTIFACT_BASE_URL: https://recipebot.devgw.com/cards
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8000
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8097:8000"
    volumes:
      - ./artifacts:/app/artifacts:ro

volumes:
  recipebot-postgres:
